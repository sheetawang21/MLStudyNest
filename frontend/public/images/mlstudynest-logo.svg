<svg width="400" height="240" viewBox="60 70 560 270" role="img" xmlns="http://www.w3.org/2000/svg">
<title>ML StudyNest Logo</title>
<desc>行星风格logo，西太后配色</desc>

<style>
  @media (prefers-color-scheme: dark) {
    .bg-ring { stroke: #6b4fa0; }
    .logo-text { fill: #e8d5f5; }
    .sub-text { fill: #b89fd4; }
    .ml-text { fill: #f0e6ff; }
  }
  .bg-ring { stroke: #9b6bc4; }
  .logo-text { fill: #3d1a6b; }
  .sub-text { fill: #7a4fa8; }
